name: Documentation issue
description: Report unclear, missing, or incorrect documentation
title: "Docs: "
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Documentation location
      description: Link to the README, docs page, PHPDoc, or section that should be improved.
      placeholder: README.md, docs/Arr.md, src/Str/HandleSearch.php, etc.
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What's unclear or incorrect?
      description: Explain what is missing, confusing, outdated, or wrong.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: If you have a preferred wording or example, include it here.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I checked existing issues and did not find a duplicate.
          required: true
